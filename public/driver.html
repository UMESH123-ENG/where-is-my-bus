<!DOCTYPE html>
<html>
<head>
  <title>Driver Portal - Haryana Roadways</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h2 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    button {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    button:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.2);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .error {
      color: #e53e3e;
      margin-top: 10px;
      text-align: center;
      padding: 10px;
      background: #fff5f5;
      border-radius: 8px;
    }
    .info-card {
      background: #f7fafc;
      border-radius: 15px;
      padding: 25px;
      margin: 20px 0;
      border: 1px solid #e2e8f0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .label {
      color: #718096;
      font-weight: 500;
    }
    .value {
      color: #2d3748;
      font-weight: 600;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-on {
      background: #c6f6d5;
      color: #22543d;
    }
    #tracking-section {
      display: none;
    }
    #login-section {
      display: block;
    }
    .gps-container {
      background: #edf2f7;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
    }
    .gps-coords {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      color: #2d3748;
      margin: 10px 0;
    }
    .gps-status {
      font-size: 14px;
      color: #718096;
    }
    .gps-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #48bb78;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .logout-btn {
      background: #e53e3e;
    }
    .logout-btn:hover {
      background: #c53030;
    }
    .button-group {
      display: flex;
      gap: 10px;
    }
    .button-group button {
      flex: 1;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #a0aec0;
      font-size: 12px;
    }
    .stops-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    .stop-tag {
      background: #e2e8f0;
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 12px;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚍 Haryana Roadways</h2>
    <div class="subtitle">Driver Portal</div>
    
    <!-- Login Form -->
    <div id="login-section">
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="email" placeholder="driver@haryanaroadways.com" value="rachana@test.com">
      </div>
      <div class="form-group">
        <label>🔐 Password</label>
        <input type="password" id="password" placeholder="••••••••" value="123456">
      </div>
      <button onclick="login()">🔑 Login</button>
      <div id="login-error" class="error"></div>
      <div class="footer">
        <p>⚡ Your bus will be automatically activated</p>
        <p>New driver? <a href="register-driver.html" style="color: #667eea;">Register here</a></p>
      </div>
    </div>

    <!-- Tracking Section (shown after login) -->
    <div id="tracking-section">
      <div class="info-card">
        <h3 style="margin-bottom: 15px; color: #4a5568;">👤 Driver Information</h3>
        <div class="info-row">
          <span class="label">Name:</span>
          <span class="value" id="driver-name">-</span>
        </div>
        <div class="info-row">
          <span class="label">Status:</span>
          <span class="value" id="driver-status">-</span>
        </div>
        <div class="info-row">
          <span class="label">Duty Hours:</span>
          <span class="value" id="duty-time">0h 0m</span>
        </div>
      </div>

      <div class="info-card">
        <h3 style="margin-bottom: 15px; color: #4a5568;">🚍 Bus Information</h3>
        <div class="info-row">
          <span class="label">Bus Number:</span>
          <span class="value" id="bus-number">-</span>
        </div>
        <div class="info-row">
          <span class="label">Route:</span>
          <span class="value" id="bus-route">-</span>
        </div>
        <div class="info-row">
          <span class="label">Stops:</span>
          <span class="value" id="bus-stops"></span>
        </div>
        <div class="info-row">
          <span class="label">Departure:</span>
          <span class="value" id="bus-departure">-</span>
        </div>
      </div>

      <div class="gps-container">
        <div class="gps-status">
          <span class="gps-dot"></span>
          <span id="gps-status-text">GPS Ready</span>
        </div>
        <div class="gps-coords" id="gps-coords">
          Waiting for GPS...
        </div>
        <div style="font-size: 12px; color: #718096; margin-top: 10px;">
          Last update: <span id="last-update">-</span>
        </div>
      </div>

      <div class="button-group">
        <button onclick="startTracking()" id="startBtn">▶ Start GPS Tracking</button>
        <button onclick="stopTracking()" id="stopBtn" style="display:none;">⏸️ Stop Tracking</button>
      </div>
      
      <button onclick="logout()" class="logout-btn">🚪 End Duty & Logout</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ==================== CONFIGURATION ====================
    let socket;
    let watchId = null;
    let token = localStorage.getItem("driverToken");
    let driverData = null;
    let firstLocationSent = false;
    let dutyStartTime = null;
    let updateInterval = null;

    // Check if already logged in
    if (token) {
      validateToken();
    }

    // ==================== TOKEN VALIDATION ====================
    async function validateToken() {
      try {
        const res = await fetch("/drivers/profile", {
          headers: { "Authorization": `Bearer ${token}` }
        });
        
        if (res.ok) {
          const data = await res.json();
          showDriverDashboard(data);
          connectSocket();
          
          // Check if tracking was active
          if (localStorage.getItem("trackingActive") === "true") {
            setTimeout(startTracking, 1000);
          }
        } else {
          localStorage.removeItem("driverToken");
          token = null;
        }
      } catch (err) {
        console.log("Token validation failed");
        localStorage.removeItem("driverToken");
        token = null;
      }
    }

    // ==================== LOGIN ====================
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("login-error");

      try {
        const response = await fetch("/drivers/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message);
        }

        // Save token and driver data
        token = data.token;
        driverData = data.driver;
        localStorage.setItem("driverToken", token);
        localStorage.setItem("driverData", JSON.stringify(data.driver));
        
        // Show dashboard
        showDriverDashboard(data.driver);
        
        // Connect socket
        connectSocket();
        
        // Start duty timer
        dutyStartTime = new Date();
        updateInterval = setInterval(updateDutyTime, 1000);

      } catch (err) {
        errorDiv.innerText = err.message;
      }
    }

    // ==================== SHOW DRIVER DASHBOARD ====================
    function showDriverDashboard(driver) {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("tracking-section").style.display = "block";
      
      // Update driver info
      document.getElementById("driver-name").innerText = driver.name;
      document.getElementById("driver-status").innerHTML = 
        '<span class="status-badge status-on">On Duty</span>';
      
      // Update bus info
      document.getElementById("bus-number").innerText = driver.busNumber || "Not assigned";
      document.getElementById("bus-route").innerText = driver.route || "No route";
      document.getElementById("bus-departure").innerText = driver.departureTime || "10:30 AM";
      
      // Format stops
      const stopsElement = document.getElementById("bus-stops");
      if (driver.stops && driver.stops.length > 0) {
        stopsElement.innerHTML = driver.stops.map(stop => 
          `<span class="stop-tag">${stop}</span>`
        ).join(' ');
      } else {
        stopsElement.innerText = "No stops data";
      }

      console.log("✅ Driver data loaded:", driver);
    }

    // ==================== CONNECT SOCKET ====================
    function connectSocket() {
      socket = io({
        auth: { token }
      });

      socket.on("connect", () => {
        console.log("✅ Socket connected");
        document.getElementById("gps-status-text").innerHTML = 
          '<span class="gps-dot"></span> Connected';
      });

      socket.on("connect_error", (err) => {
        console.log("❌ Socket error:", err.message);
        document.getElementById("gps-status-text").innerHTML = '❌ Connection error';
        
        if (err.message === "Authentication error") {
          alert("Session expired. Please login again.");
          logout();
        }
      });

      socket.on("disconnect", () => {
        console.log("❌ Socket disconnected");
        document.getElementById("gps-status-text").innerHTML = '❌ Disconnected';
      });
    }

    // ==================== START GPS TRACKING ====================
    function startTracking() {
      if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
      }

      document.getElementById("startBtn").style.display = "none";
      document.getElementById("stopBtn").style.display = "block";
      document.getElementById("gps-status-text").innerHTML = 
        '<span class="gps-dot"></span> Tracking Active';
      
      // Save tracking state
      localStorage.setItem("trackingActive", "true");

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          // Update display
          document.getElementById("gps-coords").innerHTML = 
            `${lat.toFixed(6)}° N<br>${lng.toFixed(6)}° E`;
          document.getElementById("last-update").innerText = 
            new Date().toLocaleTimeString();

          // Send to server
          socket.emit("driverLocation", { latitude: lat, longitude: lng });

          if (!firstLocationSent) {
            firstLocationSent = true;
            console.log("✅ First location sent");
          }
        },
        (error) => {
          console.log("GPS Error:", error);
          document.getElementById("gps-status-text").innerHTML = '❌ GPS Error';
          
          let errorMsg = "GPS error: ";
          switch(error.code) {
            case error.PERMISSION_DENIED:
              errorMsg += "Location permission denied";
              break;
            case error.POSITION_UNAVAILABLE:
              errorMsg += "Location unavailable";
              break;
            case error.TIMEOUT:
              errorMsg += "Location timeout";
              break;
          }
          document.getElementById("gps-coords").innerHTML = errorMsg;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    // ==================== STOP TRACKING ====================
    function stopTracking() {
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      
      localStorage.removeItem("trackingActive");
      
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("stopBtn").style.display = "none";
      document.getElementById("gps-status-text").innerHTML = '⏸️ Tracking Paused';
    }

    // ==================== UPDATE DUTY TIME ====================
    function updateDutyTime() {
      if (dutyStartTime) {
        const now = new Date();
        const diff = Math.floor((now - dutyStartTime) / 1000);
        const hours = Math.floor(diff / 3600);
        const minutes = Math.floor((diff % 3600) / 60);
        document.getElementById("duty-time").innerText = `${hours}h ${minutes}m`;
      }
    }

    // ==================== LOGOUT ====================
    async function logout() {
      stopTracking();
      
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }
      
      try {
        await fetch("/drivers/logout", {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` }
        });
      } catch (err) {
        console.log("Logout error:", err);
      }

      // Clear all storage
      localStorage.removeItem("driverToken");
      localStorage.removeItem("driverData");
      localStorage.removeItem("trackingActive");
      token = null;
      firstLocationSent = false;
      
      if (socket) {
        socket.disconnect();
      }
      
      document.getElementById("login-section").style.display = "block";
      document.getElementById("tracking-section").style.display = "none";
      document.getElementById("email").value = "rachana@test.com";
      document.getElementById("password").value = "123456";
    }

    // ==================== AUTO-RECONNECT ====================
    window.addEventListener("online", () => {
      if (token && !socket?.connected) {
        connectSocket();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
      }
    });

  </script>
</body>
</html>
