<!DOCTYPE html>
<html>
<head>
  <title>Bus Search</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .search-box {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 150px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .running {
      color: green;
      font-weight: bold;
    }

    .stopped {
      color: red;
      font-weight: bold;
    }

    .location {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<h2>🚍 Search Buses</h2>

<div class="search-box">
  <input type="text" id="from" placeholder="From">
  <input type="text" id="to" placeholder="To">
  <button onclick="searchBus()">Search</button>
</div>

<p id="loading" style="text-align:center;"></p>
<div id="results"></div>

<script>
const backendURL = "http://10.90.13.71:5000";

function searchBus() {

  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  const results = document.getElementById("results");
  const loading = document.getElementById("loading");

  results.innerHTML = "";
  loading.innerText = "Searching buses...";

  fetch(`${backendURL}/buses/search?from=${from}&to=${to}`)
    .then(res => res.json())
    .then(data => {

      loading.innerText = "";

      if (data.length === 0) {
        results.innerHTML = "<p style='text-align:center;'>No buses found</p>";
        return;
      }

      data.forEach(bus => {

        const isRunning = bus.currentLocation ? true : false;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${bus.busNumber}</h3>
          <p><strong>Departure:</strong> ${bus.departureTime}</p>
          <p><strong>Seats Available:</strong> ${bus.seatsAvailable}</p>

          <p>
            <strong>Status:</strong>
            <span class="${isRunning ? 'running' : 'stopped'}">
              ${isRunning ? '🟢 Running' : '🔴 Not Started'}
            </span>
          </p>

          ${
            isRunning
              ? `<p class="location">
                   Current Location:
                   ${bus.currentLocation.latitude.toFixed(4)},
                   ${bus.currentLocation.longitude.toFixed(4)}
                 </p>
                 <button onclick="trackBus('${bus._id}')">
                   Track Live
                 </button>`
              : `<button disabled>Not Available</button>`
          }
        `;

        results.appendChild(card);
      });

    })
    .catch(() => {
      loading.innerText = "";
      results.innerHTML = "<p style='text-align:center;'>Error fetching buses</p>";
    });
}

function trackBus(busId) {
  window.location.href = `tracking.html?busId=${busId}`;
}
</script>

</body>
</html>
