<!DOCTYPE html>
<html>
<head>
  <title>Live Bus Tracking</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 500px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>🚌 Live Bus Tracking (Day 23 – Real Road Route)</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="http://10.90.13.71:5000/socket.io/socket.io.js"></script>

<script>

const socket = io("http://10.90.13.71:5000");


const params = new URLSearchParams(window.location.search);
const busId = params.get("busId");
if(!busId) {
  console.log("No busId provided in URL. Example: tracking.html?busId=6995ce6e6c947951f302e797");
}
const map = L.map('map').setView([28.7, 77.1], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let marker = null;
let roadLine = null;
let destination = null;

// 🔵 Step 1: Get bus destination
fetch(`http://10.90.13.71:5000/buses/${busId}`)
  .then(res => res.json())
  .then(bus => {

    const cityCoordinates = {
      "Chandigarh": [30.7333, 76.7794],
      "Jind": [29.3250, 76.3120],
      "Rohtak": [28.8955, 76.6066],
      "Hisar": [29.1492, 75.7217]
    };

    destination = cityCoordinates[bus.destination.charAt(0).toUpperCase() + bus.destination.slice(1).toLowerCase()];

  });

// 🔴 Step 2: Listen for live location
socket.on("busLocationUpdate", async (data) => {

  if (String(data.busId) !== String(busId)) return;
  if (!destination) return;

  const currentLat = data.latitude;
  const currentLng = data.longitude;

  const currentPoint = [currentLat, currentLng];

  // Create or move marker
  if (!marker) {
    marker = L.marker(currentPoint).addTo(map);
  } else {
    marker.setLatLng(currentPoint);
  }

  map.panTo(currentPoint);

  // 🔥 Step 3: Fetch real road route from OSRM
  const osrmURL =
    `https://router.project-osrm.org/route/v1/driving/` +
    `${currentLng},${currentLat};` +
    `${destination[1]},${destination[0]}?overview=full&geometries=geojson`;

  const response = await fetch(osrmURL);
  const routeData = await response.json();

  if (!routeData.routes || routeData.routes.length === 0) return;

  const routeCoordinates =
    routeData.routes[0].geometry.coordinates;

  const latLngs = routeCoordinates.map(coord => [coord[1], coord[0]]);

  // Remove old road
  if (roadLine) {
    map.removeLayer(roadLine);
  }

  // Draw real road
  roadLine = L.polyline(latLngs, {
    color: "blue",
    weight: 5
  }).addTo(map);

});

socket.on("connect", () => {
  console.log("Connected to socket server");
});

</script>

</body>
</html>
